# ============================================
# Exam-Master HPA 自动扩缩容配置
# ============================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: exam-master-backend-hpa
  namespace: exam-master
  labels:
    app.kubernetes.io/name: exam-master
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: exam-master-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # CPU 使用率
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # 内存使用率
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: exam-master-frontend-hpa
  namespace: exam-master
  labels:
    app.kubernetes.io/name: exam-master
    app.kubernetes.io/component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: exam-master-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
---
# ============================================
# PodDisruptionBudget 配置
# 确保滚动更新时服务可用性
# ============================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: exam-master-backend-pdb
  namespace: exam-master
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: exam-master
      app.kubernetes.io/component: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: exam-master-frontend-pdb
  namespace: exam-master
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: exam-master
      app.kubernetes.io/component: frontend
