# ============================================
# Exam-Master ConfigMap 配置
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: exam-master-config
  namespace: exam-master
  labels:
    app.kubernetes.io/name: exam-master
    app.kubernetes.io/component: config
data:
  # 应用配置
  NODE_ENV: "production"
  PORT: "3000"
  TZ: "Asia/Shanghai"
  
  # API 配置
  API_TIMEOUT: "30000"
  AI_TIMEOUT: "60000"
  
  # 日志配置
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  
  # 缓存配置
  CACHE_TTL: "3600"
  
  # 分页配置
  PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"
