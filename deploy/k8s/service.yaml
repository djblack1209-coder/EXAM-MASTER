# ============================================
# Exam-Master Service 配置
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: exam-master-backend-svc
  namespace: exam-master
  labels:
    app.kubernetes.io/name: exam-master
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: exam-master
    app.kubernetes.io/component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: exam-master-frontend-svc
  namespace: exam-master
  labels:
    app.kubernetes.io/name: exam-master
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app.kubernetes.io/name: exam-master
    app.kubernetes.io/component: frontend
---
# ============================================
# Headless Service（用于 StatefulSet 或服务发现）
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: exam-master-backend-headless
  namespace: exam-master
  labels:
    app.kubernetes.io/name: exam-master
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: exam-master
    app.kubernetes.io/component: backend
