# ============================================
# Exam-Master Docker Compose 配置
# 用于本地开发和测试环境
# ============================================

services:
  # ==================== 前端服务 ====================
  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    image: exam-master-frontend:${VERSION:-latest}
    container_name: exam-master-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - exam-master-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`exam-master.local`)"

  # ==================== 后端服务 ====================
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: exam-master-backend:${VERSION:-latest}
    container_name: exam-master-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Shanghai
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/exam-master}
      - AI_PROVIDER_KEY_PLACEHOLDER
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - exam-master-network

  # ==================== MongoDB ====================
  mongo:
    image: mongo:7.0
    container_name: exam-master-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD must be set in .env}
      - MONGO_INITDB_DATABASE=exam-master
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - exam-master-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: exam-master-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - exam-master-network

  # ==================== Prometheus 监控 ====================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: exam-master-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - exam-master-network
    profiles:
      - monitoring

  # ==================== Grafana 可视化 ====================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: exam-master-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - exam-master-network
    profiles:
      - monitoring

  # ==================== AlertManager 告警 ====================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: exam-master-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - exam-master-network
    profiles:
      - monitoring

# ==================== 网络配置 ====================
networks:
  exam-master-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==================== 数据卷 ====================
volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
