# ============================================
# 腾讯云服务器 — Nginx 主配置
# 多项目共享服务器，每项目独立 conf.d 配置
# ============================================

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========== 日志格式 ==========
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$upstream_addr $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ========== 性能优化 ==========
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20m;
    server_tokens off;

    # ========== Gzip 压缩 ==========
    gzip on;
    gzip_static on;              # 优先发送 Vite 预压缩的 .gz 文件，省去实时压缩开销
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript application/octet-stream;

    # Brotli 预压缩（需安装 ngx_brotli 模块后取消注释）
    # brotli_static on;          # 优先发送 Vite 预压缩的 .br 文件，比 gzip 再省 15-20% 体积

    # ========== 全局限流 ==========
    limit_req_zone $binary_remote_addr zone=global_api:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=global_conn:10m;

    # ========== 加载各项目配置 ==========
    include /etc/nginx/conf.d/*.conf;
}
