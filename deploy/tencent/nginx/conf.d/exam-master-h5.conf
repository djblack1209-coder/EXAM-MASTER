# ============================================
# EXAM-MASTER H5(PWA) — 静态文件服务
# 端口: 8080 (避免与 API 的 80 端口冲突)
#
# 部署方式: 本地构建后 scp 上传到服务器
#   npm run build:h5
#   scp -r dist/build/h5/* root@101.43.41.96:/opt/apps/exam-master/h5/
#
# 或使用部署脚本:
#   bash deploy/tencent/scripts/deploy-h5.sh
# ============================================

server {
    listen 8080;
    server_name 101.43.41.96;

    root /opt/apps/exam-master/h5;
    index index.html;

    # ========== 安全头 ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== 健康检查 ==========
    location = /health {
        access_log off;
        return 200 '{"status":"ok","server":"h5-tencent"}';
        add_header Content-Type application/json;
    }

    # ========== 静态资源 — 长期缓存 ==========
    # Vite 生成的带 hash 文件名，可安全设置 1 年缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|br|gz)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # 优先发送预压缩文件 (nginx.conf 中的 gzip_static on 已全局生效)
    }

    # ========== API 代理 — 转发到后端 ==========
    # H5 前端调用 /exam-master/ 路径的 API，代理到本地后端
    location /exam-master/ {
        limit_req zone=global_api burst=30 nodelay;

        rewrite ^/exam-master/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ========== SPA 路由回退 ==========
    # Vue Router history 模式：所有非文件路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========== 禁止访问隐藏文件 ==========
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========== 错误页面 ==========
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /opt/apps/exam-master/h5;
    }
}
