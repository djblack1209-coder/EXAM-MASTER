upstream exam_master_backend {
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    server nf98ia8qnt.sealosbja.site:443 backup;
}

# HTTPS server (域名)
server {
    listen 443 ssl;
    server_name api.245334.xyz exam.245334.xyz;

    ssl_certificate /etc/letsencrypt/live/api.245334.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.245334.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 安全头 — D037/D038 修复
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health {
        access_log off;
        return 200 '{"status":"ok","server":"exam-master-tencent","ssl":true}';
        add_header Content-Type application/json;
    }

    location /exam-master/ {
        limit_req zone=exam_api burst=30 nodelay;
        rewrite ^/exam-master/(.*)$ /$1 break;
        proxy_pass http://exam_master_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location ~ ^/(login|proxy-ai|proxy-ai-stream|health-check|question-bank|answer-submit|mistake-manager|favorite-manager|user-stats|user-profile|study-stats|learning-goal|learning-resource|material-manager|rank-center|pk-battle|social-service|group-service|invite-service|achievement-manager|school-query|send-email-code|upload-avatar|voice-service|doc-convert|photo-bg|id-photo-segment-base64|ai-quiz-grade|ai-photo-search|ai-friend-memory|ai-diagnosis|agent-orchestrator|lesson-generator|rag-ingest|rag-query|anki-import|anki-export|getHomeData|fsrs-optimizer|account-delete|account-purge|data-cleanup|db-create-indexes|db-migrate-timestamps|job-bot-handoff-notify|school-crawler-api|smart-study-engine)$ {
        limit_req zone=exam_api burst=30 nodelay;
        proxy_pass http://exam_master_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location / {
        return 404 '{"code":404,"message":"Not Found"}';
        add_header Content-Type application/json;
    }
}

# HTTP → HTTPS 重定向 (域名)
server {
    listen 80;
    server_name api.245334.xyz exam.245334.xyz;
    return 301 https://$host$request_uri;
}

