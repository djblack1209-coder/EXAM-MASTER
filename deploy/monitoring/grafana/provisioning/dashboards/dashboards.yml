# ============================================
# Grafana Dashboard 配置
# ============================================
apiVersion: 1

providers:
  - name: 'Exam-Master Dashboards'
    orgId: 1
    folder: 'Exam-Master'
    folderUid: 'exam-master'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
