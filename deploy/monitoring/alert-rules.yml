# ============================================
# Prometheus 告警规则
# ============================================
groups:
  # ==================== 服务可用性告警 ====================
  - name: service-availability
    rules:
      # P0: 服务完全不可用
      - alert: ServiceDown
        expr: up{job="exam-master-backend"} == 0
        for: 1m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "服务不可用: {{ $labels.instance }}"
          description: "Exam-Master 后端服务 {{ $labels.instance }} 已停止响应超过 1 分钟"
          runbook_url: "https://wiki.example.com/runbook/service-down"

      # P0: 所有 Pod 都不健康
      - alert: AllPodsUnhealthy
        expr: |
          sum(kube_pod_status_ready{namespace="exam-master", condition="true"}) == 0
        for: 2m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "所有 Pod 不健康"
          description: "exam-master 命名空间中没有健康的 Pod"

      # P1: 健康检查失败
      - alert: HealthCheckFailed
        expr: probe_success{job="blackbox-http"} == 0
        for: 3m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "健康检查失败: {{ $labels.instance }}"
          description: "端点 {{ $labels.instance }} 健康检查失败超过 3 分钟"

  # ==================== 资源使用告警 ====================
  - name: resource-usage
    rules:
      # P1: CPU 使用率过高
      - alert: HighCPUUsage
        expr: |
          (sum(rate(container_cpu_usage_seconds_total{namespace="exam-master"}[5m])) by (pod) 
          / sum(container_spec_cpu_quota{namespace="exam-master"}/container_spec_cpu_period{namespace="exam-master"}) by (pod)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "CPU 使用率过高: {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} CPU 使用率超过 80%，当前值: {{ $value | printf \"%.1f\" }}%"

      # P1: 内存使用率过高
      - alert: HighMemoryUsage
        expr: |
          (container_memory_working_set_bytes{namespace="exam-master"} 
          / container_spec_memory_limit_bytes{namespace="exam-master"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "内存使用率过高: {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} 内存使用率超过 85%，当前值: {{ $value | printf \"%.1f\" }}%"

      # P0: Pod OOMKilled
      - alert: PodOOMKilled
        expr: |
          kube_pod_container_status_last_terminated_reason{namespace="exam-master", reason="OOMKilled"} == 1
        for: 0m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "Pod 因 OOM 被终止: {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} 容器 {{ $labels.container }} 因内存不足被终止"

      # P2: 磁盘使用率过高
      - alert: HighDiskUsage
        expr: |
          (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_avail_bytes{mountpoint="/"}) 
          / node_filesystem_size_bytes{mountpoint="/"} * 100 > 85
        for: 10m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "磁盘使用率过高: {{ $labels.instance }}"
          description: "节点 {{ $labels.instance }} 磁盘使用率超过 85%"

  # ==================== 接口性能告警 ====================
  - name: api-performance
    rules:
      # P1: 接口错误率过高
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{namespace="exam-master", status=~"5.."}[5m])) 
          / sum(rate(http_requests_total{namespace="exam-master"}[5m])) * 100 > 1
        for: 5m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "接口错误率过高"
          description: "Exam-Master API 5xx 错误率超过 1%，当前值: {{ $value | printf \"%.2f\" }}%"

      # P0: 接口错误率严重
      - alert: CriticalErrorRate
        expr: |
          sum(rate(http_requests_total{namespace="exam-master", status=~"5.."}[5m])) 
          / sum(rate(http_requests_total{namespace="exam-master"}[5m])) * 100 > 5
        for: 2m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "接口错误率严重"
          description: "Exam-Master API 5xx 错误率超过 5%，当前值: {{ $value | printf \"%.2f\" }}%"

      # P1: 接口延迟过高
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace="exam-master"}[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "接口延迟过高"
          description: "Exam-Master API P95 延迟超过 2 秒，当前值: {{ $value | printf \"%.2f\" }}s"

      # P2: QPS 异常下降
      - alert: QPSDropped
        expr: |
          sum(rate(http_requests_total{namespace="exam-master"}[5m])) 
          < sum(rate(http_requests_total{namespace="exam-master"}[5m] offset 1h)) * 0.5
        for: 10m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "QPS 异常下降"
          description: "Exam-Master API QPS 相比 1 小时前下降超过 50%"

  # ==================== 数据库告警 ====================
  - name: database
    rules:
      # P0: MongoDB 连接失败
      - alert: MongoDBDown
        expr: mongodb_up == 0
        for: 1m
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "MongoDB 连接失败"
          description: "无法连接到 MongoDB 数据库"

      # P1: MongoDB 连接数过高
      - alert: MongoDBHighConnections
        expr: mongodb_connections{state="current"} > 500
        for: 5m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "MongoDB 连接数过高"
          description: "MongoDB 当前连接数: {{ $value }}"

      # P1: MongoDB 慢查询
      - alert: MongoDBSlowQueries
        expr: rate(mongodb_mongod_metrics_query_executor_total{state="scanned_objects"}[5m]) > 10000
        for: 5m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "MongoDB 存在慢查询"
          description: "MongoDB 扫描对象数过高，可能存在慢查询"

  # ==================== Pod 状态告警 ====================
  - name: pod-status
    rules:
      # P1: Pod 重启频繁
      - alert: PodRestartingTooMuch
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace="exam-master"}[1h]) > 3
        for: 0m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Pod 重启频繁: {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} 在过去 1 小时内重启了 {{ $value }} 次"

      # P1: Pod 处于 Pending 状态
      - alert: PodPending
        expr: |
          kube_pod_status_phase{namespace="exam-master", phase="Pending"} == 1
        for: 5m
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "Pod 处于 Pending 状态: {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} 已处于 Pending 状态超过 5 分钟"

      # P2: Pod 副本数不足
      - alert: DeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas{namespace="exam-master"} 
          != kube_deployment_status_replicas_available{namespace="exam-master"}
        for: 10m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "Deployment 副本数不匹配: {{ $labels.deployment }}"
          description: "Deployment {{ $labels.deployment }} 期望 {{ $value }} 个副本，但可用副本数不足"

  # ==================== 证书告警 ====================
  - name: certificates
    rules:
      # P1: SSL 证书即将过期
      - alert: SSLCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 30
        for: 1h
        labels:
          severity: warning
          priority: P1
        annotations:
          summary: "SSL 证书即将过期: {{ $labels.instance }}"
          description: "{{ $labels.instance }} 的 SSL 证书将在 30 天内过期"

      # P0: SSL 证书即将过期（紧急）
      - alert: SSLCertExpiringCritical
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: critical
          priority: P0
        annotations:
          summary: "SSL 证书即将过期（紧急）: {{ $labels.instance }}"
          description: "{{ $labels.instance }} 的 SSL 证书将在 7 天内过期，请立即续期！"
