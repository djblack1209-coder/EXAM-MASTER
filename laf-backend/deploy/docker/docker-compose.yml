# ============================================
# Exam-Master Backend Docker Compose
# 后端独立开发/测试环境
# ============================================

version: '3.8'

services:
  # ==================== 后端服务 ====================
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: exam-master-backend:${VERSION:-latest}
    container_name: exam-master-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Shanghai
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/exam-master}
      - AI_PROVIDER_KEY_PLACEHOLDER
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-network

  # ==================== MongoDB ====================
  mongo:
    image: mongo:7.0
    container_name: exam-master-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD must be set in .env}
      - MONGO_INITDB_DATABASE=exam-master
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: exam-master-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-network

  # ==================== Prometheus 监控 ====================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: exam-master-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - backend-network
    profiles:
      - monitoring

networks:
  backend-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
