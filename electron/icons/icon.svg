<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- 装饰光效 -->
  <ellipse cx="300" cy="250" rx="400" ry="300" fill="white" opacity="0.08"/>
  <!-- 书本主体 -->
  <g transform="translate(512, 480)">
    <!-- 左页 -->
    <path d="M-30,-180 L-30,180 Q-30,200 -50,200 L-250,200 Q-270,200 -270,180 L-270,-160 Q-270,-180 -250,-180 Z" fill="url(#book)" stroke="white" stroke-width="3" opacity="0.9"/>
    <!-- 右页 -->
    <path d="M30,-180 L30,180 Q30,200 50,200 L250,200 Q270,200 270,180 L270,-160 Q270,-180 250,-180 Z" fill="url(#book)" stroke="white" stroke-width="3" opacity="0.9"/>
    <!-- 书脊 -->
    <rect x="-30" y="-180" width="60" height="380" rx="5" fill="white" opacity="0.3"/>
    <!-- 左页文字线条 -->
    <line x1="-220" y1="-120" x2="-80" y2="-120" stroke="#34D399" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="-220" y1="-70" x2="-120" y2="-70" stroke="#34D399" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <line x1="-220" y1="-25" x2="-100" y2="-25" stroke="#34D399" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <!-- 右页 AI 星芒 -->
    <g transform="translate(150, -20)">
      <polygon points="0,-60 15,-15 60,-15 25,15 35,60 0,35 -35,60 -25,15 -60,-15 -15,-15" fill="#fbbf24" opacity="0.85"/>
      <circle cx="0" cy="0" r="18" fill="white" opacity="0.9"/>
      <text x="0" y="7" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#059669">AI</text>
    </g>
    <!-- 对勾 -->
    <g transform="translate(-160, 80)">
      <circle cx="0" cy="0" r="40" fill="#34D399" opacity="0.8"/>
      <polyline points="-18,0 -5,15 20,-15" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- 底部文字 -->
  <text x="512" y="870" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="88" font-weight="700" fill="white" letter-spacing="8">EXAM</text>
</svg>
