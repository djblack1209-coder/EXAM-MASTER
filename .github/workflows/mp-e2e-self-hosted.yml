name: Mini Program E2E (Self-Hosted macOS)

on:
  workflow_dispatch:
    inputs:
      devtools_port:
        description: WeChat DevTools service port
        required: false
        default: '19099'
      run_mode:
        description: Run mode
        required: false
        type: choice
        default: report
        options:
          - report
          - plain
  schedule:
    - cron: '0 20 * * 1'

concurrency:
  group: mp-e2e-self-hosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mp-e2e:
    name: WeChat Mini Program E2E
    runs-on: [self-hosted, macOS]
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Resolve runtime inputs
        run: |
          PORT="${{ inputs.devtools_port }}"
          MODE="${{ inputs.run_mode }}"
          if [ -z "$PORT" ]; then PORT=19099; fi
          if [ -z "$MODE" ]; then MODE=report; fi

          echo "WECHAT_DEVTOOLS_PORT=$PORT" >> "$GITHUB_ENV"
          echo "WECHAT_HTTP_ENDPOINT=http://127.0.0.1:$PORT" >> "$GITHUB_ENV"
          echo "E2E_RUN_MODE=$MODE" >> "$GITHUB_ENV"

      - name: Resolve WeChat DevTools CLI path
        run: |
          if [ -x "/Applications/wechatwebdevtools.app/Contents/MacOS/cli" ]; then
            echo "WECHAT_DEVTOOLS_CLI_PATH=/Applications/wechatwebdevtools.app/Contents/MacOS/cli" >> "$GITHUB_ENV"
          elif [ -x "/Applications/微信开发者工具.app/Contents/MacOS/cli" ]; then
            echo "WECHAT_DEVTOOLS_CLI_PATH=/Applications/微信开发者工具.app/Contents/MacOS/cli" >> "$GITHUB_ENV"
          else
            echo "::warning::DevTools CLI not found in default paths. setup.js will rely on existing DevTools session/HTTP open."
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Run mini program E2E suite
        run: |
          if [ "$E2E_RUN_MODE" = "plain" ]; then
            npm run test:e2e
          else
            npm run test:e2e:report
          fi

      - name: Publish run summary
        if: always()
        run: |
          if [ -f test-results/e2e/jest-results.json ]; then
            node -e "const fs=require('node:fs');const p='test-results/e2e/jest-results.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));const totalMs=(r.testResults||[]).reduce((a,t)=>a+Math.max(0,(t.endTime||0)-(t.startTime||0)),0);const lines=['## Mini Program E2E Summary', '- Passed: '+r.numPassedTests, '- Failed: '+r.numFailedTests, '- Total: '+r.numTotalTests, '- Runtime: '+Math.round(totalMs/1000)+'s', '- Mode: '+process.env.E2E_RUN_MODE, '- Port: '+process.env.WECHAT_DEVTOOLS_PORT, '', 'Artifacts: `test-results/e2e`, `e2e-tests/error-screenshots`'];fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\\n'));"
          else
            echo "No jest JSON report found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: mp-e2e-reports-${{ github.run_id }}
          path: |
            test-results/e2e
            e2e-tests/error-screenshots
