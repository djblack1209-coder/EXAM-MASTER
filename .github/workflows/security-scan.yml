# ============================================
# Exam-Master 安全扫描工作流
# 每周一凌晨 2 点执行 + 手动触发
# ============================================
name: Security Scan

on:
  schedule:
    # 每周一凌晨 2 点执行（降低频率，避免频繁失败通知）
    - cron: '0 18 * * 1' # UTC 时间，对应北京时间周二凌晨 2 点
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - dependencies
          - container

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20.19.0'

jobs:
  # ==================== 依赖漏洞扫描 ====================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts
        continue-on-error: true

      - name: Run npm audit
        id: npm-audit
        run: |
          npm audit --json > npm-audit-report.json 2>/dev/null || true
          if [ -f npm-audit-report.json ] && [ -s npm-audit-report.json ]; then
            CRITICAL=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo "0")
            HIGH=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo "0")
          else
            CRITICAL=0
            HIGH=0
          fi
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 14

      - name: Check vulnerability threshold
        run: |
          CRITICAL="${{ steps.npm-audit.outputs.critical }}"
          HIGH="${{ steps.npm-audit.outputs.high }}"
          CRITICAL=${CRITICAL:-0}
          HIGH=${HIGH:-0}
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ] 2>/dev/null; then
            echo "::warning::Found $CRITICAL critical vulnerabilities. Review npm-audit-report for details."
          fi
          if [ "$HIGH" -gt 5 ] 2>/dev/null; then
            echo "::warning::Found $HIGH high vulnerabilities"
          fi
          # 不再因漏洞直接 exit 1，改为 warning，避免频繁失败通知
          # 真正需要阻断时可手动检查 artifact

  # ==================== 代码安全扫描 ====================
  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Initialize CodeQL
        id: codeql-init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
        continue-on-error: true

      - name: Perform CodeQL Analysis
        id: codeql-analyze
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

      - name: Annotate CodeQL result
        if: steps.codeql-init.outcome == 'failure' || steps.codeql-analyze.outcome == 'failure'
        run: echo "::warning title=CodeQL::CodeQL 代码安全分析执行失败，请检查日志或手动重新运行。"

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        id: trivy-fs
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          exit-code: '1'

      - name: Annotate Trivy filesystem result
        if: steps.trivy-fs.outcome == 'failure'
        run: echo "::warning title=Trivy Filesystem::发现 CRITICAL/HIGH 级别漏洞，请查看上方扫描报告。"

  # ==================== 容器镜像扫描 ====================
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          load: true
          tags: exam-master-backend:scan
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.35.0
        id: trivy-container
        continue-on-error: true
        with:
          image-ref: 'exam-master-backend:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Annotate container Trivy result
        if: steps.trivy-container.outcome == 'failure'
        run: echo "::warning title=Container Trivy::后端镜像发现 CRITICAL/HIGH 级别漏洞，请查看上方扫描报告。"

      - name: Skip notice
        if: steps.docker-build.outcome != 'success'
        run: echo "::notice::Container build skipped or failed. Image scan not performed."

  # ==================== 生成安全报告 ====================
  generate-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, container-scan]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        continue-on-error: true

      - name: Generate summary report
        run: |
          echo "# Security Scan Report" > security-report.md
          echo "Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> security-report.md
          echo "" >> security-report.md

          echo "## Scan Results Summary" >> security-report.md
          echo "| Scan Type | Status |" >> security-report.md
          echo "|-----------|--------|" >> security-report.md
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> security-report.md
          echo "| Code Scan | ${{ needs.code-scan.result }} |" >> security-report.md
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> security-report.md

          cat security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: security-report
          path: security-report.md
          retention-days: 14
