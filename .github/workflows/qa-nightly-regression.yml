# ============================================
# QA 夜间回归测试
# 每日 UTC 20:30 (北京时间 04:30) 自动执行
# 包含：单元测试报告 + E2E兼容性回归 + 密钥审计 + Maestro语法检查
# ============================================
name: QA Nightly Regression

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:

concurrency:
  group: qa-nightly-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== Web 回归测试 ====================
  web-regression:
    name: Web Regression (Vitest + Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # ---- 单元测试（JSON 报告 + 控制台输出） ----
      # 使用 verbose 和 json 双 reporter：
      #   - verbose 输出到 CI 日志，便于排查失败用例
      #   - json 输出到文件，供 artifact 归档
      # continue-on-error 避免阻塞后续 E2E 和密钥审计步骤
      - name: Ensure report directory exists
        run: mkdir -p docs/reports

      - name: Run unit tests (verbose + JSON report)
        id: vitest
        continue-on-error: true
        run: npx vitest run --reporter=verbose --reporter=json --outputFile=docs/reports/vitest-results-nightly.json

      - name: Summarize Vitest result
        if: steps.vitest.outcome == 'failure'
        run: |
          echo "::warning title=Vitest 单元测试失败::部分单元测试未通过，请查看上方日志或下载 vitest-results-nightly.json 分析。"
          # 提取失败数（如果 JSON 报告存在）
          if [ -f docs/reports/vitest-results-nightly.json ]; then
            node -e "
              const r = require('./docs/reports/vitest-results-nightly.json');
              const f = r.numFailedTests || 0;
              const p = r.numPassedTests || 0;
              const t = r.numTotalTests || 0;
              console.log('Tests: ' + p + ' passed, ' + f + ' failed, ' + t + ' total');
            " 2>/dev/null || echo "无法解析 JSON 报告"
          fi

      # ---- 预构建 H5（供 E2E 使用静态服务，避免 dev server 编译等待） ----
      - name: Build H5 for E2E
        id: h5-build
        continue-on-error: true
        run: npm run build:h5

      # ---- E2E 兼容性回归 ----
      # 使用预构建产物 + npx serve 替代 npm run dev:h5，大幅缩短启动时间
      # timeout-minutes 限制 E2E 步骤最长运行 25 分钟，防止耗尽 job 时间
      - name: Run compatibility regression
        id: e2e-compat
        continue-on-error: true
        timeout-minutes: 25
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
        run: |
          if [ "${{ steps.h5-build.outcome }}" = "success" ]; then
            # 使用 vite preview 提供预构建产物（端口 4173）
            npx vite preview --port 4173 --host &
            sleep 3
            npx playwright test --config=playwright.regression.compat.config.js
          else
            echo "::warning title=E2E 跳过::H5 构建失败，无法执行 E2E 测试。"
          fi

      - name: Summarize E2E result
        if: steps.e2e-compat.outcome == 'failure'
        run: echo "::warning title=E2E 兼容性回归失败::Playwright E2E 测试未通过，请查看 artifact 中的 HTML 报告。"

      # ---- 密钥审计（不应被测试失败阻塞） ----
      - name: Run tracked secrets audit
        run: npm run audit:secrets:tracked

      # ---- 最终状态判定 ----
      - name: Fail job if critical steps failed
        if: steps.vitest.outcome == 'failure'
        run: |
          echo "::error title=夜间回归失败::Vitest 单元测试未通过，请排查修复。"
          exit 1

      - name: Upload web regression artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: qa-nightly-web-reports
          path: |
            docs/reports/e2e-compat-results.json
            docs/reports/e2e-compat-results.xml
            docs/reports/e2e-compat-html
            docs/reports/e2e-regression-results.json
            docs/reports/e2e-regression-results.xml
            docs/reports/e2e-regression-html
            docs/reports/vitest-results-nightly.json
            test-results

  # ==================== Maestro 语法检查（轻量替代） ====================
  # 原 Android 模拟器方案在 GitHub Actions 上持续不稳定（adb 连接失败率 >80%），
  # 降级为仅语法检查 + 本地/云端手动触发完整流程测试。
  maestro-syntax-check:
    name: Maestro Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro syntax checks
        run: npm run test:maestro:syntax

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: qa-nightly-maestro-reports
          path: |
            docs/reports/maestro-results.xml
            docs/reports/maestro-web-smoke.xml
