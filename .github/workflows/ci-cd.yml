# ============================================
# Exam-Master 前端 CI/CD 流水线
# 触发条件：push 到 main/develop，PR 到 main
# 注意：后端 CI/CD 已迁移至独立仓库
# ============================================
name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# 同一分支/PR 的新提交自动取消旧的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '20.19.0'
  LAF_SOURCE_AUDIT_STRICT: 'true'

jobs:
  # ==================== 代码质量检查 ====================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Verify runtime
        run: |
          node -v
          npm -v
          node -e "const c=require('node:crypto'); if (typeof c.hash !== 'function') { console.error('crypto.hash is unavailable, require Node.js >= 20.12'); process.exit(1); }"

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Run Laf source audit
        run: |
          if [ "${LAF_SOURCE_AUDIT_STRICT}" = "true" ]; then
            npm run audit:laf:function-sources -- --strict
          else
            npm run audit:laf:function-sources
          fi

      # husky prepare 在 CI 中不需要，跳过 prepare 脚本
      - name: Run ESLint
        run: npm run lint
        timeout-minutes: 5

      - name: Run tests
        run: npm test
        timeout-minutes: 5

      - name: Build check
        run: npm run build:h5
        timeout-minutes: 10

      # 上传构建产物供后续 job 使用，避免重复构建
      - name: Upload build artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: h5-build
          path: dist/build/h5
          retention-days: 1

  # ==================== 安全扫描（与 lint-and-test 并行） ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    # 与 lint-and-test 并行执行，结果不阻断构建（但会产生可见告警）
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies for audit
        run: npm install --ignore-scripts
        continue-on-error: true

      # npm audit: 记录 critical 漏洞为 warning（不阻断但可见）
      - name: Run npm audit
        id: npm-audit
        continue-on-error: true
        run: npm audit --audit-level=critical

      - name: Annotate npm audit result
        if: steps.npm-audit.outcome == 'failure'
        run: echo "::warning title=npm audit::发现 critical 级别依赖漏洞，请及时处理。运行 npm audit 查看详情。"

      # Trivy: 扫描 CRITICAL/HIGH 漏洞，记录结果但不阻断构建
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@v0.35.0
        id: trivy
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'
          exit-code: '1'

      - name: Annotate Trivy result
        if: steps.trivy.outcome == 'failure'
        run: echo "::warning title=Trivy 安全扫描::发现 CRITICAL/HIGH 级别漏洞，请查看上方扫描报告。"

      # 密钥泄露检查（硬性门禁 — 发现泄露必须阻断）
      - name: Run tracked secrets audit
        run: npm run audit:secrets:tracked

  # ==================== 部署到 Staging ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.ref == 'refs/heads/develop' && vars.DEPLOY_ENABLED == 'true'
    environment:
      name: staging
      url: https://staging.245334.xyz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Lowercase image name
        id: repo
        run: echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Deploy frontend to staging
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          kubectl set image deployment/exam-master-frontend \
            frontend=${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}-frontend:${IMAGE_TAG} \
            -n exam-master-staging
          kubectl rollout status deployment/exam-master-frontend -n exam-master-staging --timeout=300s

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging.245334.xyz/health-check || exit 1

  # ==================== 部署到生产 ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    environment:
      name: production
      url: https://nf98ia8qnt.sealosbja.site
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Lowercase image name
        id: repo
        run: echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy frontend to production
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          kubectl set image deployment/exam-master-frontend \
            frontend=${{ env.REGISTRY }}/${{ steps.repo.outputs.image_name }}-frontend:${IMAGE_TAG} \
            -n exam-master
          kubectl rollout status deployment/exam-master-frontend -n exam-master --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n exam-master -l app.kubernetes.io/component=frontend
          curl -f https://nf98ia8qnt.sealosbja.site/health-check || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, rolling back..."
          kubectl rollout undo deployment/exam-master-frontend -n exam-master
